<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="no-referrer" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interstellar Admin</title>
    <link rel="stylesheet" href="/assets/css/global.css?v=6" />
    <style>
        :root {
            --admin-bg-a: #0a3f3b;
            --admin-bg-b: #11736b;
            --admin-panel: rgba(8, 48, 45, 0.86);
            --admin-border: rgba(255, 255, 255, 0.24);
            --admin-text: #f3fffd;
            --admin-muted: rgba(243, 255, 253, 0.74);
            --admin-danger: #c94343;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Story Script", cursive, sans-serif;
            color: var(--admin-text);
            background:
                radial-gradient(1200px 600px at 12% 0%, #29a597 0%, transparent 65%),
                radial-gradient(1000px 700px at 100% 100%, #0f5d57 0%, transparent 70%),
                linear-gradient(135deg, var(--admin-bg-a), var(--admin-bg-b));
            display: grid;
            place-items: center;
            padding: 24px;
            box-sizing: border-box;
        }

        .card {
            width: min(700px, 94vw);
            background: var(--admin-panel);
            border: 1px solid var(--admin-border);
            border-radius: 20px;
            box-shadow: 0 20px 55px rgba(0, 0, 0, 0.38);
            backdrop-filter: blur(10px);
            padding: 24px;
        }

        h1 {
            margin: 0 0 12px;
            letter-spacing: 0.04em;
        }

        p {
            margin: 0;
            color: var(--admin-muted);
        }

        .row {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            min-width: 220px;
            border-radius: 10px;
            border: 1px solid var(--admin-border);
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--admin-text);
            outline: none;
            font-size: 16px;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.58);
        }

        button {
            border: 1px solid var(--admin-border);
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.12);
            color: var(--admin-text);
            font-family: inherit;
            font-size: 15px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        button.danger {
            border-color: rgba(201, 67, 67, 0.7);
            background: rgba(201, 67, 67, 0.18);
        }

        button.danger:hover {
            background: rgba(201, 67, 67, 0.32);
        }

        .hidden {
            display: none;
        }

        .metrics {
            margin-top: 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--admin-border);
            border-radius: 14px;
            padding: 14px;
            line-height: 1.8;
        }

        .chat-panel {
            margin-top: 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--admin-border);
            border-radius: 14px;
            padding: 14px;
        }

        .chat-panel h2 {
            margin: 0 0 10px;
            font-size: 1.1rem;
            letter-spacing: 0.04em;
        }

        .preview-panel {
            margin-top: 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--admin-border);
            border-radius: 14px;
            padding: 14px;
        }

        .preview-panel h2 {
            margin: 0 0 10px;
            font-size: 1.1rem;
            letter-spacing: 0.04em;
        }

        .preview-viewport {
            margin-top: 10px;
            width: 100%;
            height: min(62vh, 520px);
            border: 1px solid var(--admin-border);
            border-radius: 12px;
            background: #0f1716;
            overflow: hidden;
        }

        .preview-viewport iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: #ffffff;
        }

        select {
            flex: 1;
            min-width: 220px;
            border-radius: 10px;
            border: 1px solid var(--admin-border);
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--admin-text);
            outline: none;
            font-size: 16px;
        }

        .chat-feed {
            height: 230px;
            overflow-y: auto;
            display: grid;
            gap: 8px;
            padding-right: 4px;
        }

        .chat-entry {
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .chat-entry.system {
            background: linear-gradient(145deg, rgba(70, 164, 214, 0.18), rgba(54, 120, 198, 0.12));
            border-color: rgba(139, 216, 255, 0.45);
            box-shadow: inset 0 0 0 1px rgba(139, 216, 255, 0.2);
        }

        .chat-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 4px;
            font-size: 12px;
            color: var(--admin-muted);
        }

        .chat-meta-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-author {
            font-weight: 700;
            color: var(--admin-text);
        }

        .chat-tag {
            padding: 2px 7px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            font-size: 10px;
            letter-spacing: 0.06em;
            font-weight: 700;
        }

        .chat-text {
            color: var(--admin-text);
            line-height: 1.45;
            word-break: break-word;
        }

        .chat-empty {
            padding: 24px 12px;
            text-align: center;
            color: var(--admin-muted);
        }

        .status {
            margin-top: 10px;
            min-height: 1.2em;
            color: var(--admin-muted);
        }

        .status.error {
            color: #ffc5c5;
        }

        .top-links {
            margin-top: 10px;
            font-size: 14px;
        }

        .top-links a {
            color: #dffaf4;
            text-decoration: none;
            border-bottom: 1px solid rgba(223, 250, 244, 0.35);
        }

        @media (max-width: 640px) {
            .card {
                padding: 18px;
            }

            button,
            input {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>Admin Console</h1>
        <p>This route is isolated from normal browsing pages.</p>
        <div class="top-links"><a href="/">Back To Home</a></div>

        <section id="login-panel">
            <div class="row">
                <input id="code" type="password" placeholder="Enter admin code" autocomplete="off" />
                <button id="login">Login</button>
            </div>
        </section>

        <section id="admin-panel" class="hidden">
            <div class="metrics" id="metrics"></div>
            <section class="chat-panel">
                <h2>Owner Chat</h2>
                <div class="row">
                    <input id="admin-chat-name" type="text" maxlength="24" placeholder="Owner display name" />
                </div>
                <div id="admin-chat-feed" class="chat-feed"></div>
                <div class="row">
                    <input id="admin-chat-message" type="text" maxlength="280"
                        placeholder="Send a message as the owner" />
                    <button id="admin-chat-send">Send Owner Message</button>
                    <button id="admin-chat-clear" class="danger">Clear Chat For Everyone</button>
                </div>
            </section>
            <div class="row">
                <select id="weather-effect">
                    <option value="snow">Snow</option>
                    <option value="rain">Rain</option>
                    <option value="fog">Fog</option>
                    <option value="hail">Hail</option>
                    <option value="lightning">Lightning Storm</option>
                </select>
                <button id="set-weather-effect">Enable Weather</button>
                <button id="clear-weather-effect" class="danger">Disable Weather</button>
            </div>
            <div class="row">
                <input id="proxy-url-hijack" type="text" maxlength="1000"
                    placeholder="Open this URL in the proxy for everyone" />
                <button id="set-proxy-url-hijack">Hijack Proxy URL</button>
                <button id="clear-proxy-url-hijack" class="danger">Clear Proxy Hijack</button>
            </div>
            <div class="row">
                <input id="tab-title-override" type="text" maxlength="80" placeholder="Live tab title override" />
                <input id="tab-favicon-override" type="text" maxlength="400" placeholder="Live favicon URL override" />
                <button id="set-tab-hijack">Set Tab Appearance</button>
                <button id="clear-tab-hijack" class="danger">Clear Tab Appearance</button>
            </div>
            <div class="row">
                <input id="popup-title" type="text" maxlength="80" placeholder="Popup title" />
                <input id="popup-button-text" type="text" maxlength="24" placeholder="Button text (optional)" />
            </div>
            <div class="row">
                <input id="popup-message" type="text" maxlength="320" placeholder="Popup message for all users" />
                <button id="set-popup">Show Popup</button>
                <button id="clear-popup" class="danger">Clear Popup</button>
            </div>
            <div class="row">
                <input id="maintenance-message" type="text" maxlength="180"
                    placeholder="Maintenance screen message for all users" />
                <button id="set-maintenance">Enable Maintenance</button>
                <button id="clear-maintenance" class="danger">Disable Maintenance</button>
            </div>
            <div class="row">
                <button id="trigger-jumpscare" class="danger">Trigger Jumpscare</button>
                <input id="voice-blast-message" type="text" maxlength="240"
                    placeholder="Voice message to speak for everyone" />
                <button id="trigger-voice-blast">Trigger Voice Blast</button>
                <button id="force-client-refresh" class="danger">Force Client Refresh</button>
            </div>
            <section class="chat-panel">
                <h2>Live Game</h2>
                <div class="row">
                    <input id="live-game-title" type="text" maxlength="80"
                        placeholder="Game title (example: Sky Sprint)" />
                    <input id="live-game-button-label" type="text" maxlength="24"
                        placeholder="Button label (example: Jump)" />
                    <input id="live-game-duration" type="number" min="10" max="300" value="45"
                        placeholder="Duration in seconds" />
                </div>
                <div class="row">
                    <button id="start-live-game">Start Runner Game</button>
                    <button id="reset-live-game">Reset Run</button>
                    <button id="end-live-game" class="danger">End Live Game</button>
                </div>
            </section>
            <div class="row">
                <select id="takeover-theme">
                    <option value="matrix">Matrix</option>
                    <option value="emergency">Emergency</option>
                    <option value="arcade">Arcade</option>
                    <option value="gold">Gold</option>
                </select>
                <button id="set-takeover">Enable Takeover</button>
                <button id="clear-takeover" class="danger">Disable Takeover</button>
            </div>
            <div class="row">
                <input id="banner-text" type="text" maxlength="180" placeholder="Broadcast banner text for all users" />
                <button id="set-banner">Set Banner</button>
                <button id="clear-banner" class="danger">Clear Banner</button>
            </div>
            <div class="row">
                <button id="refresh">Refresh</button>
                <button id="toggle-party">Toggle Party Mode</button>
                <button id="toggle-chaos">Toggle Chaos Mode</button>
                <button id="reset-opens" class="danger">Reset Daily Opens</button>
                <button id="clear-online" class="danger">Clear Online Users</button>
                <button id="clear-cache" class="danger">Clear Asset Cache</button>
                <button id="logout">Logout</button>
            </div>

            <section class="preview-panel">
                <h2>Live Site Preview</h2>
                <div class="row">
                    <input id="preview-path" type="text" maxlength="180" value="/"
                        placeholder="Path to preview (example: /, /a, /b, /d)" />
                    <button id="open-preview">Open Path</button>
                    <button id="refresh-preview">Refresh Preview</button>
                </div>
                <div class="preview-viewport">
                    <iframe id="site-preview" title="Live website preview" src="/" loading="lazy"
                        referrerpolicy="no-referrer"></iframe>
                </div>
            </section>
        </section>

        <div class="status" id="status"></div>
    </main>

    <script src="/assets/js/admin-page.js"></script>
</body>

</html>
